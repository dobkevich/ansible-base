---
- name: Get swap file information
  ansible.builtin.stat:
    path: /swapfile
  register: swap_stat

- name: Check if swap file is valid
  ansible.builtin.command: file /swapfile
  register: swap_file_check
  changed_when: false
  failed_when: false
  when: swap_stat.stat.exists

- name: Configure swap file
  ansible.builtin.shell: |
    set -e
    swapoff /swapfile >/dev/null 2>&1 || true
    rm -f /swapfile
    dd if=/dev/zero of=/swapfile bs=1024 count=1024k
    chmod 600 /swapfile
    mkswap /swapfile
  when: >
    not swap_stat.stat.exists or
    (swap_stat.stat.exists and "swap file" not in (swap_file_check.stdout | lower)) or
    (swap_stat.stat.exists and swap_stat.stat.size < 1073741824)
  changed_when: true

- name: Mount swap file in fstab
  ansible.posix.mount:
    path: none
    src: /swapfile
    fstype: swap
    opts: sw
    state: present

- name: Enable swap
  ansible.builtin.command: swapon -a
  changed_when: false

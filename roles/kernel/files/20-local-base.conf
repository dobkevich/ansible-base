# The settings below are common for all nodes and server roles.
# The settings in the "general usage" part at the bottom may be overriden
# for some server roles, like the load balancing and routing mesh.

# To check if the values from this file are currently loaded use the following command:
# cat /etc/sysctl.d/20-local-base.conf | grep -v '#' | grep -v -e "^$" | \
# while read LINE; do echo "In file: $LINE"; echo -n "Current: "; sysctl $(echo $LINE | cut -d= -f1); echo; done;

# Use swapping as emergency only measure
vm.swappiness=1

net.core.rmem_max=12582912
net.core.wmem_max=12582912
net.ipv4.tcp_rmem=10240 87380 12582912
net.ipv4.tcp_wmem=10240 87380 12582912

# Increase the maximum amount of option memory buffers
net.core.optmem_max = 65535

# Increase open files limit system-wide. We do not touch
# settings /etc/security/limits.conf and leave them default,
# because a service with sufficient priveleges (which runs
# as root, even if privileges are dropped consequently) can
# increase open files limit and usually there is an option
# in the service's configuration file (nginx, haproxy etc).
# Additionally, it is dangerous to rise limits for any process
# in the system as they may misbehave.
fs.file-max=1048576

# nf_conntrack_max - defines number of tracked connections.
# Also we increase hash table size and set the 'nf_conntrack_buckets'
# value (it depends on the node role and may be 131072 or 1048576).
# In case of nf_conntrack_buckets = 1048576 value of nf_conntrack_max
# should be 1048576 to make the nf_conntrack_max:nf_conntrack_buckets
# ratio equal to 1:1 (to decrease CPU usage under high load).
#
# To check current values:
# sysctl net.netfilter.nf_conntrack_max net.netfilter.nf_conntrack_buckets
#
# All related values:
# sysctl -a | grep conntrack
#
# How many active tracked connections (to check the current load):
# cat /proc/sys/net/netfilter/nf_conntrack_count
#
# Runtime configuration of both values:
#
# echo "1048576" > /proc/sys/net/netfilter/nf_conntrack_max
# echo "1048576" > /proc/sys/net/netfilter/nf_conntrack_buckets
#
net.netfilter.nf_conntrack_max=1048576
net.netfilter.nf_conntrack_buckets=131072

net.ipv4.tcp_slow_start_after_idle=0

# Increase the number of ephemeral ports
net.ipv4.ip_local_port_range=10000 64512

# Limit of socket listen() backlog (default: 128)
net.core.somaxconn=65535

# Increase syn socket queue size (default: 512)
net.ipv4.tcp_max_syn_backlog=65535

# Max packets the input can queue
net.core.netdev_max_backlog=16384

# Retry SYN/ACK only three times, instead of five
net.ipv4.tcp_synack_retries=3

# Try to close things only twice
net.ipv4.tcp_orphan_retries=2

# FIN-WAIT-2 for only 5 seconds
net.ipv4.tcp_fin_timeout=5

# Wait time between isAlive interval probes
net.ipv4.tcp_keepalive_intvl=15

# Keep fragments for 15 seconds (default: 30)
net.ipv4.ipfrag_time=15


# Security

# Spoof protection (reverse-path filter); turn on Source Address
# Verification in all interfaces to prevent some spoofing attacks
net.ipv4.conf.default.rp_filter=1
net.ipv4.conf.all.rp_filter=1

# Do not send ICMP redirects (we are not a router)
net.ipv4.conf.all.send_redirects=0

# Do not accept IP source route packets (we are not a router)
net.ipv4.conf.default.accept_source_route=0
net.ipv4.conf.all.accept_source_route=0

# Ignore echo broadcast requests to prevent being a part of smurf attacks
net.ipv4.icmp_echo_ignore_broadcasts=1

net.ipv6.conf.default.autoconf=0
net.ipv6.conf.default.accept_dad=0
net.ipv6.conf.default.accept_ra=0
net.ipv6.conf.default.accept_ra_defrtr=0
net.ipv6.conf.default.accept_ra_rtr_pref=0
net.ipv6.conf.default.accept_ra_pinfo=0
net.ipv6.conf.default.accept_source_route=0
net.ipv6.conf.default.accept_redirects=0
net.ipv6.conf.default.forwarding=0
net.ipv6.conf.all.autoconf=0
net.ipv6.conf.all.accept_dad=0
net.ipv6.conf.all.accept_ra=0
net.ipv6.conf.all.accept_ra_defrtr=0
net.ipv6.conf.all.accept_ra_rtr_pref=0
net.ipv6.conf.all.accept_ra_pinfo=0
net.ipv6.conf.all.accept_source_route=0
net.ipv6.conf.all.accept_redirects=0
net.ipv6.conf.all.forwarding=0


# Configuration for general usage
# (NOT for too many connections or DoS protection)

# Heuristic memory overcommit handling. Obvious overcommits of
# address space are refused. Used for a typical system. It
# ensures a seriously wild allocation fails while allowing
# overcommit to reduce swap usage. root is allowed to
# allocate slightly more memory in this mode.
# Zero value is the kernel default, but we use this setting
# as a reminder regarding what to expect from this
# configuration, and that it can be changed to 1 or 2 if needed (see
# https://www.kernel.org/doc/Documentation/vm/overcommit-accounting).
vm.overcommit_memory=0

net.ipv4.tcp_syncookies=0

# One hour keepalive with fewer probes (default: 7200 & 9)
net.ipv4.tcp_keepalive_probes=5
net.ipv4.tcp_keepalive_time=3600

# This should be the same as tcp_keepalive_time above
net.netfilter.nf_conntrack_tcp_timeout_established=3600

# Default 'net.ipv4.tcp_tw_reuse' value is usually 2 (enabled for
# loopback connections only, where it is 100% safe), and here we just
# ensure it is 2.
# A detailed description of TIME_WAIT and related options:
# https://vincent.bernat.ch/en/blog/2014-tcp-time-wait-state-linux
net.ipv4.tcp_tw_reuse=2
